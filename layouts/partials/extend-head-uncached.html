{{ if and .Page (.Page.HasShortcode "pdf") }}
  {{ $pdfCSS := resources.Get "css/pdf-inline-viewer.css" | fingerprint }}
  <link rel="stylesheet" href="{{ $pdfCSS.RelPermalink }}">
  {{ $pdfJS := resources.Get "js/pdf-inline-viewer.js" | fingerprint }}
  <script defer src="{{ $pdfJS.RelPermalink }}"></script>
{{ end }}
